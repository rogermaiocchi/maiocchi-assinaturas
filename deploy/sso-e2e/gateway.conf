upstream uno_canary_portal {
  server maiocchi-uno-canary-portal:3000;
  keepalive 16;
}

upstream signature_canary_portal {
  server portal-sso-candidate:8080;
  keepalive 8;
}

upstream signature_canary_docuseal {
  server docuseal-sso-candidate:3000;
  keepalive 16;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 443 ssl default_server;
  server_name _;
  ssl_certificate /run/sso-e2e-pki/server.crt;
  ssl_certificate_key /run/sso-e2e-pki/server.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_tickets off;

  location = /gateway-health {
    access_log off;
    default_type text/plain;
    return 200 'ok';
  }

  location / { return 444; }
}

server {
  listen 443 ssl;
  server_name uno-canary.maiocchi.adv.br;
  ssl_certificate /run/sso-e2e-pki/server.crt;
  ssl_certificate_key /run/sso-e2e-pki/server.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_tickets off;

  location / {
    proxy_pass http://uno_canary_portal;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_redirect off;
  }
}

server {
  listen 443 ssl;
  server_name assinatura-canary.maiocchi.adv.br;
  ssl_certificate /run/sso-e2e-pki/server.crt;
  ssl_certificate_key /run/sso-e2e-pki/server.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_tickets off;

  location ~ ^/(account_configs|api|dashboard|encrypted_user_configs|packs|sign_in|sign_out|sso|templates|user_configs|users)(/|$) {
    proxy_pass http://signature_canary_docuseal;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_redirect off;
  }

  location = /up {
    proxy_pass http://signature_canary_docuseal;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_redirect off;
  }

  location / {
    proxy_pass http://signature_canary_portal;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_redirect off;
  }
}
