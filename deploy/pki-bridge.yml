services:
  pki-bridge:
    build:
      context: "${PORTAL_SOURCE_DIR:-..}"
      dockerfile: services/pki-bridge/Dockerfile
    image: maiocchi/pki-bridge:1.3.0
    container_name: pki-bridge
    restart: unless-stopped
    mem_limit: 384m
    depends_on:
      pki-db:
        condition: service_healthy
      pades-provider:
        condition: service_healthy
    environment:
      PORT: "3400"
      PUBLIC_BASE_URL: https://assinatura.maiocchi.adv.br
      DATABASE_URL: "postgresql://pki:${PKI_DB_PASS}@pki-db:5432/pki"
      ARTIFACT_ROOT: /data/artifacts
      ARTIFACT_ENCRYPTION_KEY_FILE: /run/pki-keys/artifact-aes256.key
      AUTHENTICITY_PRIVATE_KEY_FILE: /run/pki-keys/authenticity-ed25519.pem
      AUTHENTICITY_ML_DSA_PRIVATE_KEY_FILE: /run/pki-keys/authenticity-ml-dsa-65.pem
      AUTHENTICITY_ML_DSA_KEY_ID: "${AUTHENTICITY_ML_DSA_KEY_ID:-}"
      AUTHENTICITY_PUBLIC_KEYS_DIR: /run/pki-keys
      AUTHENTICITY_KEY_ID: "${AUTHENTICITY_KEY_ID}"
      AUTHENTICITY_INTERNAL_HMAC_KEY: "${AUTHENTICITY_INTERNAL_HMAC_KEY}"
      VALIDATOR_PUBLIC_KEYS_DIR: /run/validator-keys
      PADES_ALLOWED_POLICY_OIDS: "${PADES_ALLOWED_POLICY_OIDS:-}"
      ALLOW_PUBLIC_ORIGINALS: "${ALLOW_PUBLIC_ORIGINALS:-false}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://127.0.0.1:35100}"
      PRIVATE_PADES_PROVIDER_URL: http://pades-provider:3500
      PRIVATE_PADES_PROVIDER_API_KEY: "${PRIVATE_PADES_PROVIDER_API_KEY}"
      PRIVATE_PADES_ALLOW_INTERNAL_HTTP: "true"
      REST_PKI_CORE_ENDPOINT: "${REST_PKI_CORE_ENDPOINT:-}"
      REST_PKI_CORE_API_KEY: "${REST_PKI_CORE_API_KEY:-}"
      REST_PKI_CORE_SECURITY_CONTEXT_ID: "${REST_PKI_CORE_SECURITY_CONTEXT_ID:-}"
    volumes:
      - "${PKI_ARTIFACT_DIR:-./artifacts}:/data/artifacts"
      - "${PKI_KEY_DIR:-./keys}:/run/pki-keys:ro"
      - "${PKI_VALIDATOR_KEY_DIR:-./validator-keys}:/run/validator-keys:ro"
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks: [traefik-net, pki-internal]

  pades-provider:
    build:
      context: "${PORTAL_SOURCE_DIR:-..}"
      dockerfile: services/pades-provider/Dockerfile
    image: maiocchi/pades-provider:1.1.1
    container_name: pades-provider
    restart: unless-stopped
    mem_limit: 768m
    environment:
      PORT: "3500"
      PADES_PROVIDER_API_KEY: "${PRIVATE_PADES_PROVIDER_API_KEY}"
      ICP_TRUST_DIR: /run/icp-trust
      ICP_TRUST_ROOTS: ICP-Brasilv4.crt,ICP-Brasilv5.crt,ICP-Brasilv6.crt,ICP-Brasilv12.crt,ICP-Brasilv13.crt
      PADES_POLICY_FILE: /run/pades-policy/PA_PAdES_AD_RB_v1_3.der
      PADES_POLICY_OID: "2.16.76.1.7.1.11.1.3"
      PADES_POLICY_URI: http://politicas.icpbrasil.gov.br/PA_PAdES_AD_RB_v1_3.der
      PADES_POLICY_SHA256: "23da544aef71f7a75dc85fa6e17a83875741e4baef41ec178258a5c86ace54dd"
    volumes:
      - ./icp-trust:/run/icp-trust:ro
      - ./pades-policy:/run/pades-policy:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks: [pki-internal]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3500/healthz | grep -q '\"ready\":true'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  pki-db:
    image: postgres:16
    container_name: pki-db
    restart: unless-stopped
    mem_limit: 384m
    environment:
      POSTGRES_DB: pki
      POSTGRES_USER: pki
      POSTGRES_PASSWORD: "${PKI_DB_PASS}"
    volumes:
      - "${PKI_PGDATA_DIR:-./pgdata}:/var/lib/postgresql/data"
    networks: [pki-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pki -d pki"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  traefik-net:
    external: true
    name: traefik-net
  pki-internal:
    driver: bridge
