http:
  middlewares:
    assinatura-security:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
        customResponseHeaders:
          Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"

    documents-to-main:
      redirectRegex:
        regex: '^https://documentos\.assinatura\.maiocchi\.adv\.br/(.*)'
        replacement: 'https://assinatura.maiocchi.adv.br/${1}'
        permanent: true

    sign-in-to-home:
      redirectRegex:
        regex: '^https://assinatura\.maiocchi\.adv\.br/sign_in.*'
        replacement: 'https://assinatura.maiocchi.adv.br/#advogados'
        permanent: false

    portal-auth-session-path:
      replacePath:
        path: /sign_in

    portal-auth-certificate-path:
      replacePath:
        path: /certificate_auth/login/start

    certificado-strip-headers:
      headers:
        customRequestHeaders:
          X-Forwarded-Tls-Client-Cert: ""
          X-Forwarded-Tls-Client-Cert-Info: ""

    certificado-pass-client:
      passTLSClientCert:
        pem: true

    certificado-rate-limit:
      rateLimit:
        average: 5
        burst: 10

    autenticidade-rate-limit:
      rateLimit:
        average: 20
        burst: 40

    certificado-no-store:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        referrerPolicy: no-referrer
        customResponseHeaders:
          Cache-Control: "no-store"
          Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"

  routers:
    portal-auth-session:
      entryPoints: [websecure]
      priority: 330
      rule: Host(`assinatura.maiocchi.adv.br`) && Path(`/portal-auth/session`)
      service: docuseal-svc
      middlewares: [portal-auth-session-path, assinatura-security]
      tls:
        certResolver: le

    portal-auth-certificate:
      entryPoints: [websecure]
      priority: 330
      rule: Host(`assinatura.maiocchi.adv.br`) && Path(`/portal-auth/certificate`)
      service: docuseal-svc
      middlewares: [portal-auth-certificate-path, assinatura-security]
      tls:
        certResolver: le

    legacy-sign-in:
      entryPoints: [websecure]
      priority: 320
      rule: Host(`assinatura.maiocchi.adv.br`) && Path(`/sign_in`) && Method(`GET`)
      service: assinatura-portal-svc
      middlewares: [sign-in-to-home, assinatura-security]
      tls:
        certResolver: le

    autenticidade-publica:
      entryPoints: [websecure]
      priority: 300
      rule: >-
        Host(`assinatura.maiocchi.adv.br`) &&
        (PathPrefix(`/verificacao/`) ||
        PathPrefix(`/v/`) ||
        PathPrefix(`/folha/`) ||
        PathPrefix(`/original/`) ||
        PathPrefix(`/chaves/`) ||
        PathPrefix(`/api/pades/`))
      service: pki-bridge-svc
      middlewares: [assinatura-security, autenticidade-rate-limit]
      tls:
        certResolver: le

    assinatura-portal:
      entryPoints: [websecure]
      priority: 100
      rule: Host(`assinatura.maiocchi.adv.br`)
      service: assinatura-portal-svc
      middlewares: [assinatura-security]
      tls:
        certResolver: le

    docuseal-main-paths:
      entryPoints: [websecure]
      priority: 200
      rule: >-
        Host(`assinatura.maiocchi.adv.br`) &&
        (PathRegexp(`^/(account_configs|account_custom_fields|api|blobs|blobs_proxy|certificate_auth|console_redirect|d|dashboard|direct_uploads|disk|e|encrypted_user_configs|enquiries|file|folders|invitation|js|manage|mcp|mfa_setup|new|newsletter|p|password|recede_historical_location|refresh_historical_location|representations|resubmit_form|resume_historical_location|s|send_submission_email|settings|setup|sign_in|sign_out|start_form_email_2fa_send|submissions|submissions_filters|submit_form_email_2fa|submitters|submitters_autocomplete|submitters_resubmit|success|template_folders_autocomplete|template_sharings_testing|templates|templates_upload|testing_account|testing_api_settings|timestamp_server|up|upgrade|user_configs|user_initials|user_signature|users|verify_pdf_signature|webhook_hmac|webhook_preferences|webhook_secret)(/|$)`) ||
        PathPrefix(`/packs/`) ||
        PathPrefix(`/legal/`) ||
        PathPrefix(`/apple-icon-`) ||
        PathPrefix(`/pwa-`) ||
        Path(`/preview.png`) ||
        Path(`/service-worker.js`))
      service: docuseal-svc
      middlewares: [assinatura-security]
      tls:
        certResolver: le

    maiocchi-documents:
      entryPoints: [websecure]
      priority: 10
      rule: Host(`documentos.assinatura.maiocchi.adv.br`)
      service: docuseal-svc
      middlewares: [documents-to-main]
      tls:
        certResolver: le

    maiocchi-certificate-auth:
      entryPoints: [websecure]
      priority: 100
      rule: >-
        Host(`certificado.assinatura.maiocchi.adv.br`) &&
        (Path(`/certificate_auth/login/present`) ||
        Path(`/certificate_auth/enrollment/present`) ||
        PathPrefix(`/packs/`) ||
        PathPrefix(`/legal/`) ||
        PathPrefix(`/favicon`) ||
        PathPrefix(`/apple-`) ||
        PathPrefix(`/pwa-`) ||
        Path(`/service-worker.js`))
      service: docuseal-svc
      middlewares:
        - certificado-strip-headers
        - certificado-pass-client
        - certificado-rate-limit
        - certificado-no-store
      tls:
        certResolver: le
        options: maiocchi-icp-client-auth@file

  services:
    assinatura-portal-svc:
      loadBalancer:
        healthCheck:
          path: /healthz
          interval: 30s
          timeout: 5s
        servers:
          - url: http://assinatura-portal:8080

    docuseal-svc:
      loadBalancer:
        healthCheck:
          path: /up
          interval: 30s
          timeout: 5s
        servers:
          - url: http://docuseal:3000

    pki-bridge-svc:
      loadBalancer:
        healthCheck:
          path: /healthz
          interval: 30s
          timeout: 5s
        servers:
          - url: http://pki-bridge:3400

tls:
  options:
    maiocchi-icp-client-auth:
      minVersion: VersionTLS12
      sniStrict: true
      clientAuth:
        caFiles:
          - /etc/traefik/dynamic/icp-trust/icp-client-roots.crt
        clientAuthType: VerifyClientCertIfGiven
