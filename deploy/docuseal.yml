services:
  docuseal:
    image: maiocchi/docuseal:3.0.1-maiocchi.10
    container_name: docuseal
    restart: unless-stopped
    mem_limit: 1g
    group_add: ["${SIGNATURE_SECRET_GID:-3400}"]
    depends_on:
      docuseal-db:
        condition: service_healthy
    environment:
      HOST: assinatura.maiocchi.adv.br
      APP_URL: https://assinatura.maiocchi.adv.br
      EMAIL_HOST: assinatura.maiocchi.adv.br
      SMTP_ADDRESS: smtp.mail.me.com
      SMTP_PORT: "587"
      SMTP_DOMAIN: maiocchi.adv.br
      SMTP_USERNAME: "${SMTP_USERNAME:?defina SMTP_USERNAME em /opt/docuseal/.env}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:?defina SMTP_PASSWORD em /opt/docuseal/.env}"
      SMTP_AUTHENTICATION: plain
      SMTP_ENABLE_STARTTLS: "true"
      SMTP_ENABLE_SSL: "false"
      SMTP_ENABLE_TLS: "false"
      SMTP_SSL_VERIFY: "true"
      SMTP_OPEN_TIMEOUT: "15"
      SMTP_READ_TIMEOUT: "25"
      SMTP_FROM: "Maiocchi. Assinatura <roger@maiocchi.adv.br>"
      FORCE_SSL: "true"
      DEFAULT_LOCALE: pt
      DATABASE_URL: "postgresql://docuseal:${DB_PASS}@docuseal-db:5432/docuseal"
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      CERTIFICATE_AUTH_ENABLED: "${CERTIFICATE_AUTH_ENABLED:-false}"
      CERTIFICATE_AUTH_HOST: certificado.assinatura.maiocchi.adv.br
      CERTIFICATE_AUTH_APP_HOST: assinatura.maiocchi.adv.br
      CERTIFICATE_AUTH_TRUST_BUNDLE_FILE: /run/icp-trust/icp-client-roots.crt
      MAIOCCHI_HOME_URL: https://assinatura.maiocchi.adv.br
      MAIOCCHI_LICENSE_URL: https://assinatura.maiocchi.adv.br/legal/LICENSE.txt
      PRIVATE_PADES_BRIDGE_URL: http://pki-bridge-internal:3401/internal/pades/tickets
      PRIVATE_EVIDENCE_COMPOSER_URL: http://pki-bridge-internal:3401/internal/evidence/compose
      AUTHENTICITY_INTERNAL_HMAC_KEY_FILE: /run/signature-secrets/internal-hmac.key
    volumes:
      - "${DOCUSEAL_DATA_DIR:-./data}:/data"
      - "${SIGNATURE_SECRET_DIR:-/opt/signature-secrets}:/run/signature-secrets:ro"
      - "${ICP_TRUST_DIR:-./icp-trust}:/run/icp-trust:ro"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks: [traefik-net, signature-internal, docuseal-internal]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  docuseal-db:
    image: postgres:16
    container_name: docuseal-db
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_DB: docuseal
      POSTGRES_USER: docuseal
      POSTGRES_PASSWORD: "${DB_PASS}"
    volumes:
      - "${DOCUSEAL_PGDATA_DIR:-./pgdata}:/var/lib/postgresql/data"
    networks: [docuseal-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuseal -d docuseal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  traefik-net:
    external: true
    name: traefik-net
  signature-internal:
    external: true
    name: signature-internal
  docuseal-internal:
    driver: bridge
