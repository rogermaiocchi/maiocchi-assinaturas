server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;
  charset utf-8;
  absolute_redirect off;
  port_in_redirect off;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'self' https://validar.iti.gov.br; object-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.lacunasoftware.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://cdn.lacunasoftware.com https://*.lacunasoftware.com https://localhost:* https://127.0.0.1:* wss://localhost:* wss://127.0.0.1:*; upgrade-insecure-requests" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    try_files /healthz =404;
  }

  location = /site.webmanifest {
    default_type application/manifest+json;
    try_files $uri =404;
  }

  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'self' https://validar.iti.gov.br; object-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.lacunasoftware.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://cdn.lacunasoftware.com https://*.lacunasoftware.com https://localhost:* https://127.0.0.1:* wss://localhost:* wss://127.0.0.1:*; upgrade-insecure-requests" always;
    try_files $uri =404;
  }

  location = /validar {
    try_files /validar/index.html =404;
  }

  location = /validar/ {
    try_files /validar/index.html =404;
  }

  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  error_page 404 /404.html;
  location = /404.html {
    internal;
  }
}
